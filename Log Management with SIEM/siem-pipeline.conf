input {
  file {
    path => "/var/log/auth.log"
    start_position => "beginning"
    type => "auth"
  }
  # TODO: Add syslog input
  # TODO: Add Apache log input
}

filter {
  if [type] == "auth" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:timestamp} %{IPORHOST:host} %{PROG:program}: %{GREEDYDATA:message_body}" }
    }
  }
  # TODO: Add filters for other log types
  # TODO: Add date parsing
  # TODO: Add GeoIP enrichment
}

output {
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "siem-logs-%{+YYYY.MM.dd}"
  }
}
